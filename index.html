<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dapur Mami Kita - Waroeng & Café</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FDF7E7;
            color: #143026;
        }

        .modal-active {
            overflow: hidden;
        }

        .cart-dot {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .banner-shadow {
            box-shadow: 0 10px 30px -10px rgba(20, 48, 38, 0.2);
        }
        
        .whatsapp-float {
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- App Wrapper -->
    <div id="app">
        <!-- Header Image Replacement -->
        <header class="max-w-4xl mx-auto p-4 md:p-6">
    <div class="w-full rounded-3xl overflow-hidden flex justify-center">
        <img src="https://i.postimg.cc/P59zsYBr/Green-and-Cream-Modern-Simple-Vintage-Illustrative-Cocktail-Drink-Menu-(1).png" 
             alt="Dapur Mami Kita Menu Banner" 
             class="w-40 h-auto object-cover">
    </div>
</header>

        <!-- Main Content -->
        <main class="max-w-4xl mx-auto p-6 pb-24">
            <!-- Menu Section -->
            <section class="mb-10">
                <div class="flex items-center justify-between border-b-2 border-[#143026] pb-2 mb-6">
                    <h3 class="text-2xl font-black uppercase tracking-tight">Pilih Menu :</h3>
                    <span class="text-xs font-bold px-3 py-1 bg-[#143026] text-white rounded-full">TERSEDIA</span>
                </div>
                <div id="menu-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Menu items injected by JS -->
                </div>
            </section>

            <!-- Request Menu Button -->
            <div class="pt-8 mb-10">
                <button onclick="toggleModal('request-modal', true)" class="w-full group flex items-center justify-center gap-4 py-8 rounded-3xl border-4 border-dashed border-[#143026]/20 hover:border-[#143026] hover:bg-white transition-all duration-300">
                    <div class="p-3 bg-[#FDF7E7] rounded-full border-2 border-[#143026]/10 group-hover:scale-110 transition-transform">
                        <i data-lucide="utensils-crosses" class="text-[#143026]"></i>
                    </div>
                    <div class="text-left">
                        <p class="font-black text-xl uppercase leading-none">Request Menu Lain?</p>
                        <p class="text-sm font-bold opacity-60">Klik di sini jika menu favoritmu tidak ada</p>
                    </div>
                </button>
            </div>

            <!-- Footer -->
            <div class="text-center space-y-4 pt-10 border-t border-[#143026]/20">
                <p class="text-sm italic font-medium px-4">Bisa request menu, Terima pesanan nasi kotak, Pesanan untuk jum'at berkah, Menerima Pesanan CATERING</p>
                <div class="flex items-center justify-center gap-2 font-bold text-lg bg-white/50 py-3 rounded-2xl mx-auto max-w-xs border border-[#143026]/10">
                    <i data-lucide="phone" class="w-5 h-5 text-green-700"></i> Call 0853-3641-4969
                </div>
            </div>
        </main>

        <!-- Floating Cart Button -->
        <button onclick="toggleCart(true)" class="fixed bottom-6 right-6 p-4 rounded-full shadow-2xl transition-transform active:scale-95 z-40 bg-[#143026] text-[#FDF7E7]">
            <i data-lucide="shopping-cart" class="w-8 h-8"></i>
            <div id="cart-badge" class="hidden absolute top-0 right-0 w-6 h-6 bg-red-600 rounded-full border-2 border-white flex items-center justify-center text-[10px] font-bold">0</div>
        </button>

        <!-- MODALS -->

        <!-- Detail Item Modal -->
        <div id="item-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
            <div class="bg-white rounded-2xl w-full max-w-sm overflow-hidden scale-up">
                <div class="relative h-48">
                    <img id="modal-img" src="" class="w-full h-full object-cover" alt="">
                    <button onclick="toggleModal('item-modal', false)" class="absolute top-4 right-4 p-2 bg-black/40 hover:bg-black/60 rounded-full text-white">
                        <i data-lucide="x"></i>
                    </button>
                </div>
                <div class="p-6">
                    <h4 id="modal-title" class="text-2xl font-black text-green-900 mb-1"></h4>
                    <p id="modal-price" class="text-xl font-bold text-gray-600 mb-6"></p>
                    
                    <div class="flex items-center justify-between mb-8">
                        <span class="font-bold text-gray-700">Jumlah Pesanan</span>
                        <div class="flex items-center gap-4 bg-gray-100 p-2 rounded-xl">
                            <button onclick="changeModalQty(-1)" class="p-1 hover:text-green-700"><i data-lucide="minus"></i></button>
                            <span id="modal-qty" class="w-8 text-center font-black text-xl">1</span>
                            <button onclick="changeModalQty(1)" class="p-1 hover:text-green-700"><i data-lucide="plus"></i></button>
                        </div>
                    </div>

                    <button onclick="confirmAddToCart()" class="w-full py-4 rounded-xl font-black bg-[#143026] text-[#FDF7E7] transition-all active:scale-95 hover:bg-black">
                        TAMBAHKAN KE KERANJANG
                    </button>
                </div>
            </div>
        </div>

        <!-- Floating WhatsApp Button (Tetap Kecil) -->
        <a href="https://wa.me/6285336414969?text=Halo%20Mami,%20saya%20ingin%20tanya%20seputar%20menu%20hari%20ini..." 
           target="_blank" 
           class="whatsapp-float fixed bottom-6 left-6 p-3 rounded-full shadow-2xl transition-transform active:scale-95 z-40 bg-[#25D366] text-white border-2 border-white">
            <i data-lucide="phone" class="w-6 h-6"></i>
            <span class="absolute -top-1 -right-1 bg-red-600 text-white text-[8px] font-bold px-1.5 py-0.5 rounded-full border border-white">Online</span>
        </a>

        <!-- Cart Drawer -->
        <div id="cart-drawer" class="hidden fixed inset-0 z-50">
            <div class="absolute inset-0 bg-black/40" onclick="toggleCart(false)"></div>
            <div class="absolute right-0 top-0 bottom-0 w-full max-w-md bg-white shadow-2xl flex flex-col animate-slide-in">
                <div class="p-6 flex items-center justify-between border-b bg-[#143026] text-[#FDF7E7]">
                    <div class="flex items-center gap-2 font-black text-xl"><i data-lucide="shopping-cart"></i> KERANJANG SAYA</div>
                    <button onclick="toggleCart(false)"><i data-lucide="x"></i></button>
                </div>
                <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-4 text-[#143026]">
                    <!-- Items injected by JS -->
                </div>
                <div id="cart-footer" class="hidden p-6 border-t bg-gray-50">
                    <div class="flex justify-between items-center mb-6">
                        <span class="text-gray-500 font-bold uppercase text-xs tracking-widest">Total Bayar</span>
                        <span id="cart-total" class="text-2xl font-black text-green-900">Rp 0</span>
                    </div>
                    <button onclick="openOrderForm()" class="w-full py-4 rounded-xl font-black text-center bg-[#143026] text-[#FDF7E7] flex items-center justify-center gap-2 hover:bg-black transition-colors">
                        LANJUT PESAN
                    </button>
                </div>
            </div>
        </div>

        <!-- Order Form Modal -->
        <div id="order-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-[60] backdrop-blur-sm">
            <div class="bg-white rounded-2xl w-full max-w-sm p-6 shadow-2xl">
                <h4 class="text-2xl font-black text-green-900 mb-6">Detail Pengiriman</h4>
                <div class="space-y-4 mb-6">
                    <div>
                        <label class="block text-[10px] font-black uppercase mb-1 text-gray-400 tracking-wider">Nama Lengkap</label>
                        <input id="order-nama" type="text" class="w-full p-3 bg-gray-50 rounded-xl border-2 border-gray-100 focus:border-green-900 outline-none font-bold text-[#143026]" placeholder="Masukkan nama Anda">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black uppercase mb-1 text-gray-400 tracking-wider">Alamat Lengkap</label>
                        <textarea id="order-alamat" class="w-full p-3 bg-gray-50 rounded-xl border-2 border-gray-100 focus:border-green-900 outline-none font-bold h-24 text-[#143026]" placeholder="Jl. Merdeka No. 123..."></textarea>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="toggleModal('order-modal', false)" class="flex-1 py-3 border-2 border-gray-100 rounded-xl font-bold text-gray-400">Batal</button>
                    <button onclick="checkoutToWA()" class="flex-[2] py-3 rounded-xl font-black flex items-center justify-center gap-2 text-white bg-[#25D366]">
                        <i data-lucide="send" class="w-4 h-4"></i> KIRIM KE WA
                    </button>
                </div>
            </div>
        </div>

        <!-- Request Menu Modal -->
        <div id="request-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-[70] backdrop-blur-sm">
            <div class="bg-white rounded-2xl w-full max-w-sm p-6 shadow-2xl">
                <h4 class="text-2xl font-black text-green-900 mb-6">Request Menu Baru</h4>
                <div class="space-y-4 mb-6">
                    <div>
                        <label class="block text-[10px] font-black uppercase mb-1 text-gray-400 tracking-wider">Nama Lengkap</label>
                        <input id="req-nama" type="text" class="w-full p-3 bg-gray-50 rounded-xl border-2 border-gray-100 focus:border-green-900 outline-none font-bold text-[#143026]" placeholder="Masukkan nama Anda">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black uppercase mb-1 text-gray-400 tracking-wider">Alamat</label>
                        <input id="req-alamat" type="text" class="w-full p-3 bg-gray-50 rounded-xl border-2 border-gray-100 focus:border-green-900 outline-none font-bold text-[#143026]" placeholder="Daerah mana?">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black uppercase mb-1 text-gray-400 tracking-wider">Menu yang Diinginkan</label>
                        <textarea id="req-menu" class="w-full p-3 bg-gray-50 rounded-xl border-2 border-gray-100 focus:border-green-900 outline-none font-bold h-24 text-[#143026]" placeholder="Misal: Nasi Goreng Gila"></textarea>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="toggleModal('request-modal', false)" class="flex-1 py-3 border-2 border-gray-100 rounded-xl font-bold text-gray-400">Batal</button>
                    <button onclick="sendRequestWA()" class="flex-[2] py-3 rounded-xl font-black flex items-center justify-center gap-2 text-white bg-[#25D366]">
                        <i data-lucide="send" class="w-4 h-4"></i> REQUEST VIA WA
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DATA
        const MENU_DATA = [
            { id: 1, nama: 'PECEL', harga: 8000, img: 'https://asset.kompas.com/crops/Bl583WdJr0__J2epTtcT-4azxOQ=/60x23:959x622/1200x800/data/photo/2020/11/05/5fa3f16d9c1cf.jpg' },
            { id: 2, nama: 'NASI CAMPUR', harga: 8000, img: 'https://assets-a1.kompasiana.com/items/album/2025/01/30/nasi-campur-lorita-resto-photo-by-effendy-wongso-jpg-679b21dac925c428953e7e62.jpg' },
            { id: 3, nama: 'LALAPAN TEMPE', harga: 9000, img: 'https://www.dapurkobe.co.id/wp-content/uploads/tempe-penyet.jpg  ' },
            { id: 4, nama: 'LALAPAN LELE', harga: 15000, img: 'https://asset.kompas.com/crops/EX6CU4GKK4ZvoqMgzwH5qeQPe9U=/0x1638:3376x3888/1200x800/data/photo/2022/12/05/638d95f329abe.jpg' },
            { id: 5, nama: 'LALAPAN AYAM', harga: 15000, img: 'https://i.pinimg.com/736x/c2/20/42/c22042170116e5dcbd7e3cbe1ad149cf.jpg' },
        ];

        const WA_NUMBER = "6285336414969";

        // STATE
        let cart = [];
        let activeItem = null;
        let activeQty = 1;

        // INITIALIZE
        window.onload = () => {
            renderMenu();
            lucide.createIcons();
        };

        // UI FUNCTIONS
        function renderMenu() {
            const container = document.getElementById('menu-container');
            container.innerHTML = MENU_DATA.map(item => `
                <button onclick="openItemModal(${item.id})" class="flex items-center justify-between p-4 rounded-2xl transition-all border-2 border-[#143026]/5 bg-white shadow-sm hover:border-[#143026] hover:shadow-md active:scale-95 text-left group">
                    <div class="flex items-center gap-4">
                        <div class="w-16 h-16 rounded-xl overflow-hidden bg-gray-100 flex-shrink-0">
                            <img src="${item.img}" alt="${item.nama}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                        </div>
                        <div>
                            <h5 class="font-black text-lg leading-tight uppercase tracking-tight">${item.nama}</h5>
                            <span class="text-[10px] font-bold opacity-30 uppercase tracking-widest">Detail & Pesan</span>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="text-xl font-black text-[#143026]">${item.harga/1000}k</span>
                    </div>
                </button>
            `).join('');
        }

        function openItemModal(id) {
            const item = MENU_DATA.find(i => i.id === id);
            activeItem = item;
            activeQty = 1;
            
            document.getElementById('modal-img').src = item.img;
            document.getElementById('modal-title').innerText = item.nama;
            document.getElementById('modal-price').innerText = `Rp ${item.harga.toLocaleString()}`;
            document.getElementById('modal-qty').innerText = activeQty;
            
            toggleModal('item-modal', true);
        }

        function changeModalQty(delta) {
            activeQty = Math.max(1, activeQty + delta);
            document.getElementById('modal-qty').innerText = activeQty;
        }

        function confirmAddToCart() {
            const existing = cart.find(i => i.id === activeItem.id);
            if (existing) {
                existing.qty += activeQty;
            } else {
                cart.push({ ...activeItem, qty: activeQty });
            }
            toggleModal('item-modal', false);
            updateCartUI();
        }

        function toggleModal(id, show) {
            const el = document.getElementById(id);
            if (show) {
                el.classList.remove('hidden');
                document.body.classList.add('modal-active');
            } else {
                el.classList.add('hidden');
                document.body.classList.remove('modal-active');
            }
        }

        function toggleCart(show) {
            const el = document.getElementById('cart-drawer');
            if (show) {
                el.classList.remove('hidden');
                renderCart();
            } else {
                el.classList.add('hidden');
            }
        }

        function updateCartUI() {
            const badge = document.getElementById('cart-badge');
            if (cart.length > 0) {
                badge.classList.remove('hidden');
                badge.innerText = cart.length;
            } else {
                badge.classList.add('hidden');
            }
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            const footer = document.getElementById('cart-footer');
            const totalEl = document.getElementById('cart-total');

            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center opacity-20 py-20">
                        <i data-lucide="shopping-basket" class="w-16 h-16 mb-4"></i>
                        <p class="font-bold text-sm tracking-widest uppercase">Kosong</p>
                    </div>
                `;
                footer.classList.add('hidden');
            } else {
                let total = 0;
                container.innerHTML = cart.map(item => {
                    total += (item.harga * item.qty);
                    return `
                        <div class="flex gap-4 p-4 bg-gray-50 rounded-2xl border border-gray-200">
                            <div class="flex-1">
                                <h5 class="font-black uppercase">${item.nama}</h5>
                                <p class="text-xs font-bold text-gray-500 mb-2">Rp ${item.harga.toLocaleString()}</p>
                                <div class="flex items-center gap-3">
                                    <button onclick="updateQty(${item.id}, -1)" class="w-6 h-6 flex items-center justify-center border rounded-lg bg-white shadow-sm hover:bg-gray-100"><i data-lucide="minus" class="w-3 h-3"></i></button>
                                    <span class="font-black text-sm w-4 text-center">${item.qty}</span>
                                    <button onclick="updateQty(${item.id}, 1)" class="w-6 h-6 flex items-center justify-center border rounded-lg bg-white shadow-sm hover:bg-gray-100"><i data-lucide="plus" class="w-3 h-3"></i></button>
                                </div>
                            </div>
                            <div class="text-right flex flex-col justify-between items-end">
                                <p class="font-black text-green-900">Rp ${(item.harga * item.qty).toLocaleString()}</p>
                                <button onclick="removeFromCart(${item.id})" class="text-red-500 text-[10px] font-black hover:underline uppercase tracking-tighter">Hapus</button>
                            </div>
                        </div>
                    `;
                }).join('');
                footer.classList.remove('hidden');
                totalEl.innerText = `Rp ${total.toLocaleString()}`;
            }
            lucide.createIcons();
        }

        function updateQty(id, delta) {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.qty = Math.max(1, item.qty + delta);
                renderCart();
            }
        }

        function removeFromCart(id) {
            cart = cart.filter(i => i.id !== id);
            updateCartUI();
            renderCart();
        }

        function openOrderForm() {
            toggleModal('order-modal', true);
        }

        // WHATSAPP INTEGRATION
        function checkoutToWA() {
            const nama = document.getElementById('order-nama').value;
            const alamat = document.getElementById('order-alamat').value;

            if (!nama || !alamat) {
                alert("Mohon isi nama dan alamat pengiriman");
                return;
            }

            let total = 0;
            let message = `*Dapur Mami Kita - Pesanan Baru*\n\n`;
            message += `*Nama Pembeli:* ${nama}\n`;
            message += `*Alamat:* ${alamat}\n\n`;
            message += `*Item | Jumlah | Harga*\n`;
            message += `---------------------\n`;
            
            cart.forEach(item => {
                let subtotal = item.harga * item.qty;
                total += subtotal;
                message += `${item.nama} | ${item.qty} | Rp${subtotal.toLocaleString()}\n`;
            });
            
            message += `---------------------\n`;
            message += `*Total:* Rp${total.toLocaleString()}\n\n`;
            message += `*Metode Pembayaran:*\n`;
            message += `BCA / DANA / Cash\n\n`;
            message += `_Mohon segera diproses ya Mami._`;

            window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(message)}`, '_blank');
        }

        function sendRequestWA() {
            const nama = document.getElementById('req-nama').value;
            const alamat = document.getElementById('req-alamat').value;
            const menu = document.getElementById('req-menu').value;

            if (!nama || !alamat || !menu) {
                alert("Mohon lengkapi data request menu");
                return;
            }

            let message = `*Dapur Mami Kita - Request Menu*\n\n`;
            message += `*Nama:* ${nama}\n`;
            message += `*Alamat:* ${alamat}\n`;
            message += `*Menu yang Di-request:* ${menu}\n\n`;
            message += `_Mohon info ketersediaan dan harganya ya Mami._`;

            window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(message)}`, '_blank');
            toggleModal('request-modal', false);
        }
    </script>
</body>
</html>
